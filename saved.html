<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saved Items – Learning Hub</title>
  <meta name="description" content="Your bookmarked concepts, commands, and prompts.">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .saved-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 24px;
      margin-top: 32px;
    }
    .saved-empty {
      text-align: center;
      padding: 64px 0;
      color: var(--text-muted);
      font-size: 1.2rem;
    }
  </style>
</head>
<body class="page--saved">
  <div id="bg-orbs-placeholder"></div>
  <div id="nav-placeholder"></div>

  <main class="main-content">
    <div class="container">
      <section class="hero">
        <h1 class="hero__title">Saved <span class="hero__title-gradient">Items</span></h1>
        <p class="hero__subtitle">Your personal collection of bookmarked concepts and commands.</p>
      </section>

      <div id="saved-container" class="saved-grid">
        <!-- Rendered via JS -->
      </div>
    </div>
  </main>

  <div id="footer-placeholder"></div>
  <script src="js/search-data.js"></script>
  <script src="js/common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var container = document.getElementById('saved-container');
      var bookmarks = window.LearningHubStorage.getBookmarks();

      if (bookmarks.length === 0) {
        container.innerHTML = '<div class="saved-empty">No items saved yet. Click the ★ icon on any page to bookmark it here!</div>';
        container.classList.remove('saved-grid');
        return;
      }

      // Sort by newest first
      bookmarks.sort(function(a, b) {
        return new Date(b.timestamp) - new Date(a.timestamp);
      });

      var html = '';
      for (var i = 0; i < bookmarks.length; i++) {
        var b = bookmarks[i];
        html += '<div class="card content-card reveal">';
        html += '<div class="content-card__title" style="display:flex; justify-content:space-between; align-items:center;">';
        html += '<span>🔖 ' + window.escapeHtml(b.title) + '</span>';
        html += '<button class="bookmark-btn active" data-id="' + window.escapeHtml(b.id) + '" title="Remove Bookmark">★</button>';
        html += '</div>';
        html += '<div class="content-card__body">';
        html += '<p style="font-size:0.9rem; color:var(--text-secondary);">' + window.escapeHtml(b.content) + '</p>';
        html += '<a href="' + window.escapeHtml(b.link) + '" style="display:inline-block; margin-top:16px; font-size:0.9rem; color:var(--accent-cyan);">→ Go to original page</a>';
        html += '</div></div>';
      }

      container.innerHTML = html;

      // Add remove functionality
      var btns = container.querySelectorAll('.bookmark-btn');
      for (var j = 0; j < btns.length; j++) {
        btns[j].addEventListener('click', function(e) {
          var id = e.currentTarget.getAttribute('data-id');
          window.LearningHubStorage.toggleBookmark(id, '', '', '');
          e.currentTarget.closest('.card').style.display = 'none';
        });
      }
    });
  </script>
</body>
</html>
